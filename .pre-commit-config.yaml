repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2048']

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint -- --fix=false
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: typecheck
        name: typecheck
        entry: npm run typecheck
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
